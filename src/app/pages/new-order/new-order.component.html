<div class="new-order-page">
  <!-- Header -->
  <header class="topbar">
    <div class="topbar-left">
      <a class="btn-back"
         [routerLink]="['/waiters']"
         [queryParams]="{ restaurantId: restaurantId }">
        &larr;
      </a>
      <h1 class="logo">{{ restaurantName() || 'QrCafe' }} <span class="logo-accent">Nueva Orden</span></h1>
    </div>
  </header>

  <!-- Error -->
  <div *ngIf="error()" class="error-card">
    <p>{{ error() }}</p>
  </div>

  <!-- Loading -->
  <div *ngIf="loading()" class="loading">
    <p>Cargando productos...</p>
  </div>

  <div *ngIf="!loading() && !error()" class="order-body">
    <!-- Order meta -->
    <div class="meta-section">
      <div class="meta-field">
        <label class="meta-label">Mesa</label>
        <input type="number"
               class="meta-input"
               placeholder="N. mesa"
               [ngModel]="tableNumber()"
               (ngModelChange)="setTableNumber($event)" />
      </div>
      <div class="meta-field">
        <label class="meta-label">Cliente (opcional)</label>
        <input type="text"
               class="meta-input"
               placeholder="Nombre"
               [(ngModel)]="customerName" />
      </div>
    </div>

    <!-- Products by category -->
    <div class="categories">
      <section *ngFor="let group of groupedProducts(); trackBy: trackByCategory" class="category-section">
        <h2 class="category-title">{{ group.category }}</h2>

        <div class="product-list">
          <div *ngFor="let p of group.items; trackBy: trackByProduct" class="product-row">
            <div class="product-info">
              <span class="product-name">{{ p.name }}</span>
              <span class="product-price">${{ formatPrice(p.price) }}</span>
              <div *ngIf="qtyOf(p.id) > 0" class="item-note-wrap">
                <input
                  type="text"
                  class="item-note-input"
                  placeholder="Nota para este producto (ej: sin cebolla)"
                  [ngModel]="itemNotesOf(p.id)"
                  (ngModelChange)="updateItemNotes(p.id, $event)" />
              </div>
            </div>

            <div class="product-actions">
              <ng-container *ngIf="qtyOf(p.id) === 0; else qtyCtrl">
                <button class="btn-add" (click)="addToCart(p)">Agregar</button>
              </ng-container>

              <ng-template #qtyCtrl>
                <div class="qty-control">
                  <button class="qty-btn" (click)="dec(p.id)">-</button>
                  <span class="qty-num">{{ qtyOf(p.id) }}</span>
                  <button class="qty-btn" (click)="inc(p.id)">+</button>
                </div>
              </ng-template>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Notes -->
    <div class="meta-section" *ngIf="cart().length > 0">
      <div class="meta-field meta-field--full">
        <label class="meta-label">Notas (opcional)</label>
        <textarea class="meta-input meta-textarea"
                  placeholder="Instrucciones especiales..."
                  [(ngModel)]="orderNotes"
                  rows="2"></textarea>
      </div>
    </div>
  </div>

  <!-- Submit error -->
  <div *ngIf="submitError()" class="submit-error">
    {{ submitError() }}
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar" *ngIf="cart().length > 0">
    <div class="bottom-bar__inner">
      <div class="bottom-bar__left">
        <span class="bottom-bar__count">{{ itemCount() }} item{{ itemCount() > 1 ? 's' : '' }}</span>
        <span class="bottom-bar__total">${{ formatPrice(subtotal()) }}</span>
      </div>
      <button class="btn-confirm"
              [disabled]="submitting()"
              (click)="submitOrder()">
        {{ submitting() ? 'Creando...' : 'Confirmar orden' }}
      </button>
    </div>
  </div>
</div>
